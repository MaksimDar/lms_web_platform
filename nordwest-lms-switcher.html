<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>NordWest LMS</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #0B101E; font-family: 'Figtree', sans-serif; }
  .switcher {
    position: fixed; top: 14px; right: 20px; z-index: 9999;
    display: flex; align-items: center;
    background: rgba(11,16,30,0.88); backdrop-filter: blur(16px);
    border: 1px solid #2B3B5A; border-radius: 40px; padding: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,230,204,0.08);
  }
  .sw-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 16px; border-radius: 30px; border: none; cursor: pointer;
    font-family: 'Figtree', sans-serif; font-size: 13px; font-weight: 600;
    transition: all 0.22s ease; white-space: nowrap;
    background: transparent; color: #8BA3CB;
  }
  .sw-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
  .sw-btn.active { background: #00E6CC; color: #00332D; box-shadow: 0 0 14px rgba(0,230,204,0.35); }
  .sw-btn:not(.active):hover { color: #F1F5F9; background: rgba(255,255,255,0.06); }
  .sw-divider { width: 1px; height: 20px; background: #2B3B5A; margin: 0 2px; }
  .frame-wrap { position: absolute; inset: 0; transition: opacity 0.28s ease; }
  .frame-wrap.hidden { opacity: 0; pointer-events: none; }
  iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>

<div class="switcher">
  <button class="sw-btn active" id="btn-standard" onclick="switchTo('standard')">

    Standard
  </button>
  <div class="sw-divider"></div>

    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>

&lt;script&gt;
  const pages = [&#x27;dashboard&#x27;,&#x27;courses&#x27;,&#x27;assessments&#x27;,&#x27;grades&#x27;];
  const headings = { dashboard:&#x27;Dashboard&#x27;, courses:&#x27;Course Management&#x27;, assessments:&#x27;Exam Creation&#x27;, grades:&#x27;Gradebook &amp; Results&#x27; };

  function navigate(id) {
    pages.forEach(p =&gt; {
      const el = document.getElementById(&#x27;page-&#x27; + p);
      const nav = document.getElementById(&#x27;nav-&#x27; + p);
      if (el) el.classList.toggle(&#x27;active&#x27;, p === id);
      if (nav) {
        if (p === id) {
          nav.classList.remove(&#x27;text-muted-foreground&#x27;,&#x27;hover:bg-muted&#x27;,&#x27;hover:text-foreground&#x27;);
          nav.classList.add(&#x27;bg-primary/10&#x27;,&#x27;text-primary&#x27;,&#x27;font-medium&#x27;);
        } else {
          nav.classList.add(&#x27;text-muted-foreground&#x27;,&#x27;hover:bg-muted&#x27;,&#x27;hover:text-foreground&#x27;);
          nav.classList.remove(&#x27;bg-primary/10&#x27;,&#x27;text-primary&#x27;,&#x27;font-medium&#x27;);
        }
      }
    });
    const h = document.getElementById(&#x27;page-heading&#x27;);
    if (h) h.textContent = headings[id] || id;
    return false;
  }

  function setCourseTab(tab) {
    [&#x27;materials&#x27;,&#x27;students&#x27;].forEach(t =&gt; {
      const btn = document.getElementById(&#x27;ctab-&#x27; + t);
      const content = document.getElementById(&#x27;ctab-content-&#x27; + t);
      const active = t === tab;
      if (btn) {
        btn.classList.toggle(&#x27;bg-primary/10&#x27;, active);
        btn.classList.toggle(&#x27;text-primary&#x27;, active);
        btn.classList.toggle(&#x27;text-muted-foreground&#x27;, !active);
      }
      if (content) content.classList.toggle(&#x27;hidden&#x27;, !active);
    });
  }

  function setRole(role) {
    [&#x27;lecturer&#x27;,&#x27;student&#x27;].forEach(r =&gt; {
      const btn = document.getElementById(&#x27;role-&#x27; + r);
      if (!btn) return;
      if (r === role) {
        btn.classList.add(&#x27;bg-primary&#x27;,&#x27;text-primary-foreground&#x27;,&#x27;shadow-[0_0_10px_rgba(0,230,204,0.3)]&#x27;);
        btn.classList.remove(&#x27;text-muted-foreground&#x27;);
      } else {
        btn.classList.remove(&#x27;bg-primary&#x27;,&#x27;text-primary-foreground&#x27;,&#x27;shadow-[0_0_10px_rgba(0,230,204,0.3)]&#x27;);
        btn.classList.add(&#x27;text-muted-foreground&#x27;);
      }
    });
  }

  /* ─── CARD ─── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 20px;
    position: relative; overflow: hidden;
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-family: &#x27;Syne&#x27;, sans-serif; font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
  .card-action { font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 500; }
  .card-action:hover { color: var(--accent-bright); }

  /* ─── BUTTONS ─── */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 18px; border-radius: 10px;
    font-family: &#x27;DM Sans&#x27;, sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.18s; border: none; text-decoration: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-bright); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(79,142,247,0.35); }
  .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary); }
  .btn-secondary:hover { background: var(--surface-hover); border-color: var(--border-bright); color: var(--text-primary); }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid transparent; }
  .btn-ghost:hover { background: var(--surface); color: var(--text-primary); }
  .btn-danger { background: rgba(255,107,107,0.12); border: 1px solid rgba(255,107,107,0.25); color: var(--coral); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
  .btn-gold { background: var(--gold-light); border: 1px solid rgba(240,180,41,0.25); color: var(--gold); }
  .btn-gold:hover { background: rgba(240,180,41,0.2); }

  /* ─── TABLE ─── */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    text-align: left; font-size: 11px; font-weight: 500;
    letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted);
    padding: 0 14px 10px; border-bottom: 1px solid var(--border);
  }
  .data-table td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13.5px; color: var(--text-secondary); vertical-align: middle; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(255,255,255,0.02); }
  .table-name { color: var(--text-primary); font-weight: 500; }
  .table-id { font-family: &#x27;DM Mono&#x27;, monospace; font-size: 11px; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 2px 7px; border-radius: 5px; }

  /* ─── BADGES ─── */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 500; padding: 3px 9px;
    border-radius: 20px;
  }
  .badge-blue { background: rgba(79,142,247,0.12); color: var(--accent-bright); border: 1px solid rgba(79,142,247,0.2); }
  .badge-teal { background: var(--teal-soft); color: var(--teal); border: 1px solid rgba(0,201,167,0.2); }
  .badge-gold { background: var(--gold-light); color: var(--gold); border: 1px solid rgba(240,180,41,0.2); }
  .badge-coral { background: rgba(255,107,107,0.1); color: var(--coral); border: 1px solid rgba(255,107,107,0.2); }
  .badge-purple { background: rgba(167,139,250,0.1); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }
  .badge-gray { background: rgba(255,255,255,0.06); color: var(--text-secondary); border: 1px solid var(--border); }

  /* ─── PROGRESS ─── */
  .progress-bar { height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }

  /* ─── AVATAR ─── */
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: &#x27;Syne&#x27;, sans-serif; font-weight: 700; font-size: 11px; flex-shrink: 0; }
  .avatar-sm { width: 26px; height: 26px; font-size: 9px; }
  .avatar-lg { width: 44px; height: 44px; font-size: 15px; }
  .av-blue { background: linear-gradient(135deg, #2563EB, var(--accent)); color: #fff; }
  .av-teal { background: linear-gradient(135deg, var(--teal), #059669); color: #fff; }
  .av-gold { background: linear-gradient(135deg, var(--gold), #EF8C0F); color: #fff; }
  .av-coral { background: linear-gradient(135deg, var(--coral), #E53E3E); color: #fff; }
  .av-purple { background: linear-gradient(135deg, var(--purple), #7C3AED); color: #fff; }

  /* ─── QUICK ACCESS ─── */
  .quick-access { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 24px; }
  .qa-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 10px 12px;
    text-align: center; cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .qa-btn:hover { background: var(--surface-hover); border-color: var(--border-bright); transform: translateY(-2px); }
  .qa-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; margin: 0 auto; }
  .qa-label { font-size: 11px; color: var(--text-secondary); line-height: 1.3; text-align: center; }

  /* ─── COURSE CARD ─── */
  .course-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
    transition: all 0.2s; cursor: pointer;
  }
  .course-card:hover { border-color: var(--border-bright); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
  .course-banner { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 32px; position: relative; overflow: hidden; }
  .course-banner::before { content: &#x27;&#x27;; position: absolute; inset: 0; opacity: 0.2; }
  .course-body { padding: 14px; }
  .course-name { font-family: &#x27;Syne&#x27;, sans-serif; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: var(--text-primary); line-height: 1.3; }
  .course-meta { font-size: 11.5px; color: var(--text-muted); display: flex; gap: 10px; margin-bottom: 10px; }
  .course-students { display: flex; align-items: center; gap: -4px; }
  .course-students .avatar { border: 2px solid var(--navy); margin-left: -6px; }
  .course-students .avatar:first-child { margin-left: 0; }

  /* ─── CALENDAR ─── */
  .mini-calendar { width: 100%; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-month { font-family: &#x27;Syne&#x27;, sans-serif; font-size: 14px; font-weight: 600; }
  .cal-nav { display: flex; gap: 4px; }
  .cal-nav-btn { width: 26px; height: 26px; border-radius: 7px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; color: var(--text-secondary); transition: all 0.15s; }
  .cal-nav-btn:hover { background: var(--surface-hover); color: var(--text-primary); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-day-label { font-size: 10px; text-align: center; color: var(--text-muted); padding: 4px 0; font-weight: 500; }
  .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 8px; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; }
  .cal-day:hover { background: var(--surface-hover); color: var(--text-primary); }
  .cal-day.today { background: var(--accent); color: #fff; font-weight: 600; }
  .cal-day.has-event { position: relative; color: var(--accent-bright); font-weight: 500; }
  .cal-day.has-event::after { content: &#x27;&#x27;; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 3px; height: 3px; border-radius: 50%; background: var(--accent); }
  .cal-day.other-month { color: var(--text-muted); opacity: 0.4; }

  /* ─── SCHEDULE ─── */
  .schedule-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .schedule-item:last-child { border-bottom: none; }
  .schedule-time { font-size: 11px; color: var(--text-muted); min-width: 68px; padding-top: 2px; }
  .schedule-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .schedule-content { flex: 1; min-width: 0; }
  .schedule-title { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .schedule-sub { font-size: 11.5px; color: var(--text-muted); }

  /* ─── UPLOAD ZONE ─── */
  .upload-zone {
    border: 1.5px dashed rgba(79,142,247,0.3); border-radius: var(--radius-lg);
    padding: 32px; text-align: center; cursor: pointer;
    transition: all 0.2s; margin-bottom: 16px;
  }
  .upload-zone:hover { border-color: var(--accent); background: var(--accent-glow); }
  .upload-icon { font-size: 28px; margin-bottom: 10px; }
  .upload-text { color: var(--text-secondary); font-size: 13px; }
  .upload-text strong { color: var(--accent-bright); }

  /* ─── MATERIAL ROW ─── */
  .material-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .material-item:last-child { border-bottom: none; }
  .material-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .material-info { flex: 1; min-width: 0; }
  .material-name { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .material-meta { font-size: 11px; color: var(--text-muted); }
  .material-actions { display: flex; gap: 6px; }

  /* ─── QUESTION CARD ─── */
  .question-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    transition: all 0.2s;
  }
  .question-card:hover { border-color: rgba(255,255,255,0.12); }
  .question-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
  .question-num { width: 26px; height: 26px; border-radius: 7px; background: var(--accent-glow); border: 1px solid var(--border-bright); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--accent-bright); flex-shrink: 0; }
  .question-text { font-size: 13.5px; color: var(--text-primary); flex: 1; line-height: 1.5; }
  .question-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .q-opt { display: flex; align-items: center; gap: 8px; padding: 8px 11px; border-radius: 8px; border: 1px solid var(--border); font-size: 12.5px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
  .q-opt:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.12); color: var(--text-primary); }
  .q-opt.correct { border-color: rgba(0,201,167,0.35); background: rgba(0,201,167,0.06); color: var(--teal); }
  .q-radio { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid currentColor; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .q-opt.correct .q-radio::after { content: &#x27;&#x27;; width: 6px; height: 6px; border-radius: 50%; background: var(--teal); display: block; }

  /* ─── GRADE TABLE ─── */
  .grade-score { font-family: &#x27;Syne&#x27;, sans-serif; font-size: 16px; font-weight: 700; }
  .grade-A { color: var(--teal); }
  .grade-B { color: var(--accent-bright); }
  .grade-C { color: var(--gold); }
  .grade-D { color: var(--coral); }
  .score-bar { height: 3px; border-radius: 2px; margin-top: 4px; }

  /* ─── NOTIFICATION PANEL ─── */
  .notif-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .notif-item:last-child { border-bottom: none; }
  .notif-icon { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .notif-content { flex: 1; min-width: 0; }
  .notif-text { font-size: 13px; color: var(--text-primary); line-height: 1.4; }
  .notif-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .notif-unread { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 5px; }

  /* ─── EMPTY ─── */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state p { font-size: 13px; }

  /* ─── TIMETABLE ─── */
  .timetable { display: grid; grid-template-columns: 60px repeat(5, 1fr); gap: 2px; }
  .tt-header { font-size: 11px; font-weight: 500; text-align: center; color: var(--text-muted); padding: 8px 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tt-time { font-size: 11px; color: var(--text-muted); text-align: right; padding: 6px 8px 0 0; }
  .tt-cell { border-radius: 7px; min-height: 48px; }
  .tt-event { border-radius: 7px; padding: 6px 8px; font-size: 11px; font-weight: 500; line-height: 1.3; }
  .tt-event.blue { background: rgba(79,142,247,0.15); color: var(--accent-bright); border: 1px solid rgba(79,142,247,0.2); }
  .tt-event.teal { background: var(--teal-soft); color: var(--teal); border: 1px solid rgba(0,201,167,0.2); }
  .tt-event.gold { background: var(--gold-light); color: var(--gold); border: 1px solid rgba(240,180,41,0.2); }
  .tt-event.purple { background: rgba(167,139,250,0.1); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }

  /* ─── SEARCH INPUT ─── */
  .search-input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 14px;
    color: var(--text-primary); font-size: 13px; font-family: &#x27;DM Sans&#x27;, sans-serif;
    outline: none; transition: all 0.18s; width: 100%;
  }
  .search-input:focus { border-color: var(--border-bright); background: rgba(79,142,247,0.05); }
  .search-input::placeholder { color: var(--text-muted); }

  /* ─── FILTER ROW ─── */
  .filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .filter-select {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 9px; padding: 7px 12px;
    color: var(--text-secondary); font-size: 12.5px; font-family: &#x27;DM Sans&#x27;, sans-serif;
    outline: none; cursor: pointer; appearance: none;
  }
  .filter-select:focus { border-color: var(--border-bright); }

  /* SECTION HEADER */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-family: &#x27;Syne&#x27;, sans-serif; font-size: 16px; font-weight: 700; letter-spacing: -0.4px; }
  .section-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* AI BADGE */
  .ai-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; padding: 2px 8px; border-radius: 20px; background: linear-gradient(135deg, rgba(167,139,250,0.15), rgba(79,142,247,0.15)); border: 1px solid rgba(167,139,250,0.25); color: var(--purple); font-weight: 500; letter-spacing: 0.3px; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 1100px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .three-col { grid-template-columns: 1fr 1fr; }
  }

    courses: &#x27;My Courses&#x27;,
    calendar: &#x27;Academic Calendar&#x27;
  };

  function showPage(id) {
    document.querySelectorAll(&#x27;.page&#x27;).forEach(p =&gt; p.classList.remove(&#x27;active&#x27;));
    document.querySelectorAll(&#x27;.nav-item&#x27;).forEach(n =&gt; n.classList.remove(&#x27;active&#x27;));
    const page = document.getElementById(&#x27;page-&#x27; + id);
    if (page) page.classList.add(&#x27;active&#x27;);
    const title = document.getElementById(&#x27;page-title&#x27;);
    if (title) title.textContent = pages[id] || id;
    document.querySelectorAll(&#x27;.nav-item&#x27;).forEach(n =&gt; {
      if (n.getAttribute(&#x27;onclick&#x27;) &amp;&amp; n.getAttribute(&#x27;onclick&#x27;).includes(&quot;&#x27;&quot; + id + &quot;&#x27;&quot;)) {
        n.classList.add(&#x27;active&#x27;);
      }
    });
    document.querySelector(&#x27;.content&#x27;).scrollTo(0, 0);
  }

  // Animate progress bars on load
  setTimeout(() =&gt; {
    document.querySelectorAll(&#x27;.progress-fill&#x27;).forEach(bar =&gt; {
      const w = bar.style.width;
      bar.style.width = &#x27;0&#x27;;
      setTimeout(() =&gt; { bar.style.width = w; }, 100);
    });
  }, 200);
&lt;/script&gt;
